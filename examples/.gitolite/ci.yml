# cicd-runner pipeline manifest — drop at the repo root as .gitolite/ci.yml.
# Presence of this file = opt-in. Branch/path filtering mirrors GitHub Actions
# `on:` semantics: `*` matches within a path/branch segment, `**` across `/`.
#
# Events:
#   push    -> commits pushed to an existing branch   (newrev/oldrev real)
#   create  -> a new branch first appears             (oldrev = 000…)
#   delete  -> a branch is deleted                     (newrev = 000…) -> teardown
#
# Injected into every job (env vars): CI_EVENT, CI_REPO, CI_BRANCH,
# CI_BRANCH_SLUG (DNS-safe), CI_SHA, CI_PUSHER, CI_CACHE_DIR, CI_ENV_DIR.
# Secrets: this repo's ci/secrets.enc.yaml is sops-decrypted and injected as env.

version: 1

jobs:

  # ── production: deploy only when site/ changes on main ───────────────────────
  deploy-site:
    on:
      push:
        branches: [main]
        paths: ["site/**"]
    image: node:20-alpine
    secrets: [cloudflare]
    timeout: 900            # runner-enforced wall-clock kill (safety). memory/pids/network too.
    network: bridge
    run: sh ci/deploy-site.sh
    # NOTE: retry + notify are NOT manifest fields. The script does them via
    # /cicd/lib.sh:  retry -n 3 -- npm ci ;  notify_success/notify_error.

  # ── preview envs: every feature/experiment branch, on create AND push ────────
  preview:
    on:
      create:
        branches: ["feat/*", "exp/*", "preview/**"]
      push:
        branches: ["feat/*", "exp/*", "preview/**"]
        paths: ["site/**"]
    image: node:20-alpine
    secrets: [cloudflare]
    run: sh ci/preview-deploy.sh     # idempotent create-or-update; names resources off CI_BRANCH_SLUG

  # ── teardown: when one of those branches is deleted ──────────────────────────
  preview-teardown:
    on:
      delete:
        branches: ["feat/*", "exp/*", "preview/**"]
    image: node:20-alpine
    secrets: [cloudflare]
    run: sh ci/preview-teardown.sh   # full tree at /work (preserve ref), state at CI_ENV_DIR
    # script retries the delete via `retry` from /cicd/lib.sh; on final failure the
    # runner keeps the preserve ref + state for the operator (ci-teardown).

  # ── example of branches-ignore + paths-ignore (optional knobs) ───────────────
