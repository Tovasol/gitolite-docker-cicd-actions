version: 1
jobs:
  # liveness check — every push to main, no secrets. Proves the pipeline is alive.
  smoke:
    on: { push: { branches: [main] } }
    image: alpine
    run: sh ci/smoke.sh

  # self-test: lint + unit + adversarial suite for the runner itself. The whole repo
  # IS the runner, so this fires on every push to main. Self-contained — installs its
  # own deps (shellcheck, yq, duckdb) in-container; needs no secrets.
  test:
    on: { push: { branches: [main] } }
    image: node:lts-bookworm-slim          # bash + node (harness JSON validation)
    timeout: 600
    run: sh ci/test.sh
